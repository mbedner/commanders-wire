# ─── Main Ingest Worker ───────────────────────────────────────────────────────
name = "burgundy-feed-ingest"
main = "workers/ingest-worker.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]   # every hour on the hour

[[kv_namespaces]]
binding = "ARTICLES_KV"
id      = "3a4b4607b132477c968a5fc087fdda36"
preview_id = "3a4b4607b132477c968a5fc087fdda36"

[vars]
REFRESH_SECRET = "Commanders"
REWRITE_MODE   = "witty"   # straight | witty | savage

# ─── Astro Pages site uses the SAME KV namespace ──────────────────────────────
# In Cloudflare Pages → Settings → Functions → KV namespace bindings:
#   Variable name: ARTICLES_KV
#   KV namespace:  burgundy-feed-articles  (same namespace as above)
#
# That binding makes `env.ARTICLES_KV` available in your Astro SSR routes.
